# ─────────────────────────────────────────────
# SonarQube Project Configuration
# This file tells SonarQube what to scan
# ─────────────────────────────────────────────

# Unique key for this project in SonarQube dashboard
sonar.projectKey=logguard-backend

# Display name on the SonarQube dashboard
sonar.projectName=LogGuard Backend

# Version (can be updated each release)
sonar.projectVersion=1.0

# Where the source code lives (relative to this file)
sonar.sources=backend/src/main/java

# Where the tests live
sonar.tests=backend/src/test/java

# Java compiled classes (needed for deeper analysis)
sonar.java.binaries=backend/target/classes

# Encoding
sonar.sourceEncoding=UTF-8