spring:
  application:
    name: logguard-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logguard}
    username: ${SPRING_DATASOURCE_USERNAME:logguard}
    password: ${SPRING_DATASOURCE_PASSWORD:logguard123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080